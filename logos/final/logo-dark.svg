<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 100">
  <!-- AutoQuill AI — Dark Mode (for dark backgrounds) -->

  <defs>
    <linearGradient id="fg" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="textGradDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="60%" stop-color="#E9E5F5"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>

  <!-- Feather (no waveform) -->
  <g transform="translate(5, 10)">
    <path d="M 38 50 C 22 14, 6 1, 0 8 C 10 32, 26 56, 38 50 Z" fill="url(#fg)"/>
    <line x1="1" y1="8" x2="36" y2="49" stroke="white" stroke-width="1" opacity="0.32"/>
    <line x1="5" y1="13" x2="9" y2="6" stroke="white" stroke-width="0.55" opacity="0.48"/>
    <line x1="9" y1="18" x2="14" y2="10" stroke="white" stroke-width="0.55" opacity="0.44"/>
    <line x1="12" y1="22" x2="17" y2="13" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <line x1="16" y1="26" x2="21" y2="18" stroke="white" stroke-width="0.5" opacity="0.36"/>
    <line x1="19" y1="30" x2="23" y2="22" stroke="white" stroke-width="0.5" opacity="0.32"/>
    <line x1="23" y1="34" x2="27" y2="27" stroke="white" stroke-width="0.5" opacity="0.26"/>
    <line x1="27" y1="38" x2="30" y2="32" stroke="white" stroke-width="0.4" opacity="0.2"/>
    <line x1="5" y1="14" x2="3" y2="22" stroke="white" stroke-width="0.4" opacity="0.2"/>
    <line x1="9" y1="19" x2="7" y2="27" stroke="white" stroke-width="0.4" opacity="0.18"/>
    <line x1="12" y1="23" x2="11" y2="32" stroke="white" stroke-width="0.4" opacity="0.15"/>
    <line x1="16" y1="27" x2="15" y2="35" stroke="white" stroke-width="0.4" opacity="0.12"/>
  </g>

  <!-- Wordmark (light text for dark backgrounds) -->
  <text x="65" y="50" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <tspan font-size="35" font-weight="600" fill="url(#textGradDark)" letter-spacing="-0.5">AutoQuill</tspan>
    <tspan font-size="35" font-weight="300" fill="#A78BFA" letter-spacing="3" dx="10">AI</tspan>
  </text>

  <!-- Waveform aligned under text -->
  <g transform="translate(65, 62)">
    <rect x="0" y="3" width="3.5" height="5" rx="1.5" fill="#7C3AED"/>
    <rect x="8" y="1.5" width="3.5" height="8" rx="1.5" fill="#7C3AED"/>
    <rect x="16" y="0" width="3.5" height="11" rx="1.5" fill="#7C3AED"/>
    <rect x="24" y="2.5" width="3.5" height="6" rx="1.5" fill="#8B5CF6"/>
    <rect x="32" y="0" width="3.5" height="11" rx="1.5" fill="#8B5CF6"/>
    <rect x="40" y="1.5" width="3.5" height="8" rx="1.5" fill="#8B5CF6"/>
    <rect x="48" y="0.5" width="3.5" height="10" rx="1.5" fill="#A78BFA"/>
    <rect x="56" y="3" width="3.5" height="5" rx="1.5" fill="#A78BFA"/>
    <rect x="64" y="1" width="3.5" height="9" rx="1.5" fill="#A78BFA"/>
    <rect x="72" y="2" width="3.5" height="7" rx="1.5" fill="#C4B5FD"/>
    <rect x="80" y="3" width="3.5" height="5" rx="1.5" fill="#C4B5FD"/>
    <rect x="88" y="4" width="3.5" height="3" rx="1.5" fill="#C4B5FD"/>
  </g>
</svg>
